<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área de Membros — 5 Projetos Rurais</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--green:#8BC34A;--dg:#33691E;--gold:#FDD835;--heading:'Sora',sans-serif;--body:'DM Sans',sans-serif;--muted:#688050;--text2:#b0a890;--text1:#f5f0e8;--bg1:#0a0f0a;--bg2:#0d120d;--card:rgba(255,255,255,0.025);--border:rgba(139,195,74,0.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
body{background:var(--bg1);color:var(--text1);font-family:var(--body);min-height:100vh;overflow-x:hidden}
::selection{background:var(--green);color:var(--bg1)}

/* Layout */
.app{max-width:500px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;animation:fadeUp .4s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,195,74,.3)}70%{box-shadow:0 0 0 10px rgba(139,195,74,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(10,15,10,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:var(--heading);font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px}
.header .plan-badge{font-size:.55rem;padding:3px 8px;border-radius:100px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.plan-basic{background:rgba(139,195,74,.1);color:var(--green);border:1px solid rgba(139,195,74,.15)}
.plan-premium{background:linear-gradient(135deg,rgba(253,216,53,.12),rgba(253,216,53,.05));color:var(--gold);border:1px solid rgba(253,216,53,.2)}
.back-btn{background:none;border:1px solid rgba(255,255,255,.06);color:var(--text2);font-family:var(--heading);font-size:.75rem;padding:7px 14px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;transition:all .2s}
.back-btn:active{transform:scale(.96)}

/* Progress bar */
.progress-bar{height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin:0 16px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--dg),var(--green));border-radius:2px;transition:width .6s ease}

/* Dashboard */
.welcome{padding:24px 16px 16px;text-align:center}
.welcome h2{font-family:var(--heading);font-size:1.15rem;font-weight:700;margin-bottom:6px}
.welcome p{font-size:.82rem;color:var(--text2);line-height:1.5}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin:16px 0}
.stat{padding:14px 8px;border-radius:14px;text-align:center;background:var(--card);border:1px solid var(--border)}
.stat .num{font-family:var(--heading);font-size:1.1rem;font-weight:800;color:var(--green);display:block}
.stat .label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* Project cards */
.section-title{padding:20px 16px 10px;font-family:var(--heading);font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.project-list{padding:0 16px;display:grid;gap:10px}
.project-card{display:flex;gap:14px;align-items:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;position:relative;overflow:hidden}
.project-card:active{transform:scale(.98)}
.project-card .icon{font-size:1.6rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(139,195,74,.06);flex-shrink:0;animation:float 3s ease-in-out infinite}
.project-card .info{flex:1;min-width:0}
.project-card .info h3{font-family:var(--heading);font-size:.88rem;font-weight:700;color:var(--text1);margin-bottom:2px}
.project-card .info .meta{font-size:.72rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.project-card .info .meta span{display:flex;align-items:center;gap:3px}
.project-card .arrow{color:var(--muted);font-size:.9rem;flex-shrink:0}
.project-card .check-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.check-dot.done{background:var(--green)}
.check-dot.pending{background:rgba(255,255,255,.08)}

/* Detail page */
.detail-hero{position:relative;padding:28px 16px 20px;text-align:center;background:rgba(139,195,74,.02)}
.detail-hero .emoji{font-size:3rem;margin-bottom:10px;display:block;animation:float 3s ease-in-out infinite}
.detail-hero h2{font-family:var(--heading);font-size:1.25rem;font-weight:800;margin-bottom:6px}
.detail-hero .detail-meta{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.detail-hero .detail-meta .chip{font-size:.7rem;padding:5px 12px;border-radius:100px;background:rgba(139,195,74,.06);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:4px}
.detail-desc{padding:16px;font-size:.88rem;color:var(--text2);line-height:1.65;border-bottom:1px solid rgba(255,255,255,.03)}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:52px;background:rgba(10,15,10,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:10}
.tab{flex:1;padding:12px 8px;text-align:center;font-family:var(--heading);font-size:.7rem;font-weight:600;letter-spacing:.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* Tab content */
.tab-content{padding:16px;display:none;animation:fadeUp .3s ease}
.tab-content.active{display:block}

/* Materials list */
.material-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.material-item .mat-name{color:var(--text2);flex:1}
.material-item .mat-qty{color:var(--green);font-family:var(--heading);font-weight:600;font-size:.78rem;text-align:right;min-width:60px}

/* Steps */
.step{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.step-num{width:28px;height:28px;border-radius:50%;background:rgba(139,195,74,.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--heading);font-size:.72rem;font-weight:700;color:var(--green);flex-shrink:0;margin-top:2px}
.step-text{font-size:.85rem;color:var(--text2);line-height:1.6;flex:1}
.step-text strong{color:var(--text1)}

/* Checklist */
.check-item{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;-webkit-tap-highlight-color:transparent}
.check-box{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(139,195,74,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'✓';font-size:.7rem;color:var(--bg1);font-weight:700}
.check-text{font-size:.82rem;color:var(--text2);line-height:1.4;transition:all .2s}
.check-text.checked{text-decoration:line-through;color:var(--muted)}

/* Tips */
.tip-card{padding:14px;border-radius:12px;margin-bottom:8px;font-size:.82rem;line-height:1.55}
.tip-card.green{background:rgba(139,195,74,.04);border:1px solid rgba(139,195,74,.08);color:var(--text2)}
.tip-card.red{background:rgba(198,40,40,.04);border:1px solid rgba(198,40,40,.08);color:#d4c8b0}
.tip-card .tip-label{font-family:var(--heading);font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block}
.tip-card.green .tip-label{color:var(--green)}
.tip-card.red .tip-label{color:#ef5350}

/* Bonus */
.bonus-card{padding:18px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.bonus-card:active{transform:scale(.98)}
.bonus-card.gold{border-color:rgba(253,216,53,.15);background:rgba(253,216,53,.02)}
.bonus-card h4{font-family:var(--heading);font-size:.88rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.bonus-card p{font-size:.78rem;color:var(--text2);line-height:1.5}
.bonus-lock{opacity:.5;position:relative}
.bonus-lock::after{content:'🔒 Exclusivo Premium';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,15,10,.8);border-radius:16px;font-family:var(--heading);font-size:.72rem;color:var(--muted);font-weight:600}

/* Footer bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,15,10,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.bottom-nav .nav-inner{max-width:500px;margin:0 auto;display:flex;justify-content:space-around}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.nav-item .nav-icon{font-size:1.1rem}
.nav-item .nav-label{font-family:var(--heading);font-size:.55rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);transition:color .2s}
.nav-item.active .nav-label{color:var(--green)}

/* Padding for bottom nav */
.app{padding-bottom:70px}

/* Splash */
.splash{position:fixed;inset:0;z-index:999;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeOut .5s ease 2s forwards}
.splash .logo{font-size:2.5rem;margin-bottom:12px;animation:float 2s ease-in-out infinite}
.splash h2{font-family:var(--heading);font-size:1rem;font-weight:700;color:var(--text1);margin-bottom:4px}
.splash p{font-size:.78rem;color:var(--muted)}
.splash .loader{width:24px;height:24px;border:2px solid rgba(139,195,74,.15);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-top:20px}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}

/* Plan toggle */
.plan-toggle{display:flex;gap:0;background:rgba(255,255,255,.03);border-radius:12px;padding:3px;margin:0 16px}
.plan-toggle button{flex:1;padding:10px;border:none;background:transparent;font-family:var(--heading);font-size:.72rem;font-weight:600;color:var(--muted);border-radius:10px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.plan-toggle button.active{background:rgba(139,195,74,.1);color:var(--green);border:1px solid rgba(139,195,74,.15)}
</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="logo">🏗️</div>
  <h2>5 Projetos Rurais</h2>
  <p>Preparando sua área de membros...</p>
  <div class="loader"></div>
</div>

<div class="app" id="app">
  <!-- All screens rendered by JS -->
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-inner">
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="nav-icon">📐</span>
      <span class="nav-label">Projetos</span>
    </div>
    <div class="nav-item" onclick="navigate('bonus')" id="nav-bonus">
      <span class="nav-icon">🎁</span>
      <span class="nav-label">Bônus</span>
    </div>
    <div class="nav-item" onclick="navigate('config')" id="nav-config">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Config</span>
    </div>
  </div>
</div>

    ],
    checklist: ['Pallets coletados (8-10)','Local definido (sombra parcial, perto da cozinha)','3 caixas montadas','Tela de fundo instalada','Primeira camada marrom depositada','Lona de cobertura posicionada','Placa identificando cada estágio']

  {

    ],
    steps: [

    ],
    tips: [

      {type:'green',title:'☀️ Dica',text:'Posicione inclinado para o norte (hemisfério sul) para máxima captação solar.'},
      {type:'red',title:'⚠️ Erro Comum',text:'Pintar de branco por dentro = não aquece. TEM que ser preto fosco.'},
      {type:'red',title:'⚠️ Erro Comum',text:'Sem ventilação = umidade não sai e alimento mofa em vez de secar.'}
    ],
    checklist: ['Materiais cortados nas medidas','Caixa base montada','Interior pintado de preto (2 demãos)','Bandeja com tela pronta','Furos de ventilação feitos','Tampa transparente instalada','Teste de temperatura realizado','Primeiro lote de frutas secando']
  }
];

const BONUSES = [
  {id:'cerca',icon:'🌳',name:'Cerca Viva Produtiva',desc:'Como fazer cercas usando plantas que dão frutos, temperos e remédios. Economize em cerca e ainda colha.', premium:true},
  {id:'ferramentas',icon:'🔧',name:'Guia de Ferramentas Essenciais',desc:'As 12 ferramentas que todo construtor rural precisa. Onde comprar barato e como manter.', premium:true},
  {id:'monetizacao',icon:'📱',name:'Guia de Monetização nas Redes',desc:'30 ideias de conteúdo prontas, calendário semanal, como filmar só com celular e começar a ganhar dinheiro mostrando suas construções.', premium:true, gold:true},
  {id:'telegram',icon:'💬',name:'Grupo VIP no Telegram',desc:'Tire dúvidas direto com o Seu João e outros membros. Fotos de projetos, dicas exclusivas.', premium:true}
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  currentScreen: 'dashboard',
  selectedProject: null,
  activeTab: 'passos',
  plan: localStorage.getItem('plan') || 'premium',
  checkedItems: JSON.parse(localStorage.getItem('checkedItems') || '{}'),
  completedProjects: JSON.parse(localStorage.getItem('completedProjects') || '[]')
};

function savePersist() {
  localStorage.setItem('checkedItems', JSON.stringify(state.checkedItems));
  localStorage.setItem('completedProjects', JSON.stringify(state.completedProjects));
  localStorage.setItem('plan', state.plan);
}

function getProjectProgress(projectId) {
  const project = PROJECTS.find(p => p.id === projectId);
  if (!project) return 0;
  const key = projectId;
  const checked = (state.checkedItems[key] || []).length;
  return Math.round((checked / project.checklist.length) * 100);
}

function getTotalProgress() {
  let total = 0, done = 0;
  PROJECTS.forEach(p => { total += p.checklist.length; done += (state.checkedItems[p.id] || []).length; });
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function getCompletedCount() {
  return PROJECTS.filter(p => getProjectProgress(p.id) === 100).length;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  switch(state.currentScreen) {
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'detail': app.innerHTML = renderDetail(); break;
    case 'bonus': app.innerHTML = renderBonus(); break;
    case 'config': app.innerHTML = renderConfig(); break;
  }
  updateNav();
}

function renderDashboard() {
  const totalProg = getTotalProgress();
  const completedCount = getCompletedCount();
  return `
    <div class="header">
      <h1>🏗️ 5 Projetos Rurais</h1>
      <span class="plan-badge ${state.plan === 'premium' ? 'plan-premium' : 'plan-basic'}">
        ${state.plan === 'premium' ? '⭐ Premium' : 'Básico'}
      </span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${totalProg}%"></div></div>
    <div class="welcome">
      <h2>Bem-vindo ao seu canteiro de obras 🔨</h2>
      <p>Escolha um projeto e comece a construir. Cada passo concluído fica salvo.</p>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="num">${completedCount}/5</span><span class="label">Concluídos</span></div>
      <div class="stat"><span class="num">${totalProg}%</span><span class="label">Progresso</span></div>
      <div class="stat"><span class="num">${state.plan === 'premium' ? '4' : '0'}</span><span class="label">Bônus</span></div>
    </div>
    <div class="section-title">📐 Seus Projetos</div>
    <div class="project-list" style="padding-bottom:20px">
      ${PROJECTS.map((p, i) => {
        const prog = getProjectProgress(p.id);
        return `
        <div class="project-card" onclick="openProject('${p.id}')" style="animation-delay:${i*0.06}s">
          <div class="check-dot ${prog === 100 ? 'done' : 'pending'}"></div>
          <div class="icon" style="animation-delay:${i*0.4}s">${p.icon}</div>
          <div class="info">
            <h3>${p.name}</h3>
            <div class="meta">
              <span>💰 ${p.cost}</span>
              <span>⏱ ${p.time}</span>
              <span style="color:${prog>0?'var(--green)':'var(--muted)'}">${prog}%</span>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderDetail() {
  const p = PROJECTS.find(pr => pr.id === state.selectedProject);
  if (!p) return '';
  const prog = getProjectProgress(p.id);
  const checkedArr = state.checkedItems[p.id] || [];
  const tab = state.activeTab;

  return `
    <div class="header">
      <button class="back-btn" onclick="navigate('dashboard')">← Voltar</button>
      <span style="font-family:var(--heading);font-size:.75rem;font-weight:600;color:${prog===100?'var(--green)':'var(--text2)'}">${prog}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="detail-hero">
      <span class="emoji">${p.icon}</span>
      <h2>${p.name}</h2>
      <div class="detail-meta">
        <span class="chip">💰 ${p.cost}</span>
        <span class="chip">⏱ ${p.time}</span>
        <span class="chip">📊 ${p.difficulty}</span>
      </div>
    </div>
    <div class="detail-desc">${p.desc}</div>

    <div class="tabs">
      <div class="tab ${tab==='passos'?'active':''}" onclick="setTab('passos')">Passo a Passo</div>
      <div class="tab ${tab==='materiais'?'active':''}" onclick="setTab('materiais')">Materiais</div>
      <div class="tab ${tab==='checklist'?'active':''}" onclick="setTab('checklist')">Checklist</div>
      <div class="tab ${tab==='dicas'?'active':''}" onclick="setTab('dicas')">Dicas</div>
    </div>

    <div class="tab-content ${tab==='passos'?'active':''}">
      ${p.steps.map((s, i) => `
        <div class="step">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${s.text}</div>
        </div>
      `).join('')}
    </div>

    <div class="tab-content ${tab==='materiais'?'active':''}">
      <div style="padding:4px 0">
        ${p.materials.map(m => `
          <div class="material-item">
            <span class="mat-name">${m.name}</span>
            <span class="mat-qty">${m.qty}</span>
          </div>
        `).join('')}
      </div>
      <div class="tip-card green" style="margin-top:14px">
        <span class="tip-label">💡 Dica de Reaproveitamento</span>
        Antes de comprar, procure materiais usados em demolições, mercados e vizinhos. Economia de até 60%.
      </div>
    </div>

    <div class="tab-content ${tab==='checklist'?'active':''}">
      ${p.checklist.map((item, i) => {
        const isChecked = checkedArr.includes(i);
        return `
        <div class="check-item" onclick="toggleCheck('${p.id}', ${i})">
          <div class="check-box ${isChecked?'checked':''}"></div>
          <span class="check-text ${isChecked?'checked':''}">${item}</span>
        </div>`;
      }).join('')}
      <div style="text-align:center;padding:16px 0">
        <p style="font-size:.75rem;color:var(--muted)">${checkedArr.length}/${p.checklist.length} itens concluídos</p>
      </div>
    </div>

    <div class="tab-content ${tab==='dicas'?'active':''}">
      ${p.tips.map(t => `
        <div class="tip-card ${t.type}">
          <span class="tip-label">${t.title}</span>
          ${t.text}
        </div>
      `).join('')}
    </div>
  `;
}

function renderBonus() {
  const isPremium = state.plan === 'premium';
  return `
    <div class="header">
      <h1>🎁 Bônus</h1>
      <span class="plan-badge ${isPremium ? 'plan-premium' : 'plan-basic'}">
        ${isPremium ? '⭐ Premium' : 'Básico'}
      </span>
    </div>
    <div class="welcome">
      <h2>${isPremium ? 'Seus bônus estão liberados! 🎉' : 'Bônus exclusivos do Premium 🔒'}</h2>
      <p>${isPremium ? 'Acesse todo o conteúdo extra incluído no seu plano.' : 'Faça upgrade para o Premium e desbloqueie todos os bônus.'}</p>
    </div>
    <div style="padding:0 16px;display:grid;gap:10px;padding-bottom:20px">
      ${BONUSES.map(b => {
        const locked = b.premium && !isPremium;
        return `
        <div class="bonus-card ${b.gold?'gold':''} ${locked?'bonus-lock':''}">
          <h4>${b.icon} ${b.name}</h4>
          <p>${b.desc}</p>
        </div>`;
      }).join('')}
      ${!isPremium ? `
      <div style="text-align:center;padding:16px 0">
        <a href="#" style="display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#558B2F,#8BC34A);color:var(--bg1);font-family:var(--heading);font-weight:800;font-size:.82rem;border-radius:12px;text-decoration:none;text-transform:uppercase;letter-spacing:.5px">
          UPGRADE PARA PREMIUM — R$20
        </a>
        <p style="font-size:.7rem;color:var(--muted);margin-top:8px">Diferença de R$20 · Acesso imediato</p>
      </div>` : ''}
    </div>
  `;
}

function renderConfig() {
  const totalProg = getTotalProgress();
  return `
    <div class="header">
      <h1>⚙️ Configurações</h1>
    </div>
    <div class="welcome">
      <h2>Seu perfil</h2>
      <p>Gerencie seu plano e progresso.</p>
    </div>
    <div class="section-title">Plano Ativo (Demo)</div>
    <div class="plan-toggle">
      <button class="${state.plan==='basic'?'active':''}" onclick="setPlan('basic')">Básico</button>
      <button class="${state.plan==='premium'?'active':''}" onclick="setPlan('premium')">⭐ Premium</button>
    </div>
    <div style="padding:16px">
      <div class="tip-card green">
        <span class="tip-label">📊 Seu Progresso Global</span>
        ${totalProg}% concluído · ${getCompletedCount()}/5 projetos finalizados
      </div>
      <div style="margin-top:16px">
        <button onclick="resetProgress()" style="width:100%;padding:12px;background:rgba(198,40,40,.08);border:1px solid rgba(198,40,40,.12);border-radius:12px;color:#ef5350;font-family:var(--heading);font-size:.78rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent">
          Resetar Progresso
        </button>
      </div>
      <div style="text-align:center;margin-top:28px">
        <p style="font-size:.65rem;color:#252520">5 Projetos Rurais · Área de Membros v1.0</p>
        <p style="font-size:.6rem;color:#1a1a15;margin-top:4px">Todos os direitos reservados</p>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function navigate(screen) {
  state.currentScreen = screen;
  state.activeTab = 'passos';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function openProject(id) {
  state.selectedProject = id;
  state.currentScreen = 'detail';
  state.activeTab = 'passos';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setTab(tab) {
  state.activeTab = tab;
  render();
}

function toggleCheck(projectId, index) {
  if (!state.checkedItems[projectId]) state.checkedItems[projectId] = [];
  const arr = state.checkedItems[projectId];
  const idx = arr.indexOf(index);
  if (idx > -1) arr.splice(idx, 1); else arr.push(index);
  savePersist();
  render();
}

function setPlan(plan) {
  state.plan = plan;
  savePersist();
  render();
}

function resetProgress() {
  if (confirm('Tem certeza? Todo progresso será perdido.')) {
    state.checkedItems = {};
    state.completedProjects = [];
    savePersist();
    render();
  }
}

function updateNav() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const map = {dashboard:'nav-dashboard',detail:'nav-dashboard',bonus:'nav-bonus',config:'nav-config'};
  const el = document.getElementById(map[state.currentScreen]);
  if (el) el.classList.add('active');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => render(), 2200);
});
</script>
</body>
</html>
